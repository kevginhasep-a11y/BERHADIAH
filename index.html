<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spin Wheel Pola</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #222;
  color: white;
}

.container {
  position: relative;
  width: 320px;
  margin: 40px auto;
}

.arrow {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

canvas {
  background: #fff;
  border-radius: 50%;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
}

#status { color: yellow; }
#result { margin-top: 15px; font-size: 20px; }
</style>
</head>

<body>

<h2>🎡 Spin & Win</h2>

<div class="container">
  <div class="arrow">⬇️</div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button onclick="spin()">🎯 Spin</button>

<div id="status">Status: Siap</div>
<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = ["Zonk","RP.5.000","RP.10.000"];
const colors = ["red","green","blue"];

let startAngle = 0;
let spinning = false;
let spinCount = 0;

const arc = Math.PI * 2 / prizes.length;

function drawWheel() {
  for (let i = 0; i < prizes.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,startAngle+i*arc,startAngle+(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(startAngle+i*arc+arc/2);
    ctx.fillStyle="#fff";
    ctx.font="14px Arial";
    ctx.fillText(prizes[i],40,0);
    ctx.restore();
  }
}

drawWheel();

function getResultIndex() {
  let cycle = spinCount % 12;

  if (cycle < 5) return 0; // zonk
  if (cycle === 5) return 1; // 5rb
  if (cycle < 11) return 0; // zonk lagi
  return 2; // 10rb
}

function spin() {
  if (spinning) return;

  spinning = true;
  spinCount++;

  let targetIndex = getResultIndex();

  let pointerAngle = (3 * Math.PI / 2);
  let targetAngle = pointerAngle - (targetIndex * arc) - arc/2;

  let duration = 4000;
  let start = null;

  let initialAngle = startAngle;
  let totalRotation = (10 * Math.PI) + (targetAngle - initialAngle);

  function animate(t) {
    if (!start) start = t;
    let progress = t - start;

    let p = progress / duration;
    if (p > 1) p = 1;

    let ease = 1 - Math.pow(1 - p, 3);

    startAngle = initialAngle + totalRotation * ease;

    ctx.clearRect(0,0,300,300);
    drawWheel();

    if (p < 1) {
      requestAnimationFrame(animate);
    } else {
      startAngle = startAngle % (Math.PI * 2);
      spinning = false;

      document.getElementById("result").innerText =
        "🎁 Kamu dapat: " + prizes[targetIndex];
    }
  }

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
