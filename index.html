<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spin Wheel Aman</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #222;
  color: white;
}

.container {
  position: relative;
  width: 320px;
  margin: 40px auto;
}

.arrow {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

canvas {
  background: #fff;
  border-radius: 50%;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#welcome {
  font-size: 18px;
  color: #00ffcc;
  margin-top: 15px;
  text-shadow: 0 0 8px #00ffcc;
}

#status {
  margin-top: 10px;
  color: yellow;
}

#result {
  margin-top: 20px;
  font-size: 20px;
}

/* WhatsApp */
.wa-float {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: #25D366;
  color: white;
  font-size: 24px;
  padding: 15px 18px;
  border-radius: 50%;
  text-decoration: none;
  z-index: 999;
}
</style>
</head>

<body>

<h2>🎡 Spin & Win</h2>

<div class="container">
  <div class="arrow">⬇️</div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<p id="welcome">🎉 Selamat datang di Spin Berhadiah! 🎉</p>

<button onclick="pay()">💰 Scan & Bayar</button>
<button onclick="spin()" id="spinBtn" disabled>🎯 Spin</button>

<div id="status">Status: Belum bayar</div>
<div id="result"></div>

<!-- WhatsApp -->
<a href="https://wa.me/6287774340447" class="wa-float" target="_blank">💬</a>

<script>
let paid = false;

// UI only (tidak menentukan hasil lagi)
function pay() {
  document.getElementById("status").innerText = "Memproses pembayaran...";

  fetch("https://YOUR-BACKEND/pay", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId: "user123" })
  });

  setTimeout(() => {
    paid = true;
    document.getElementById("spinBtn").disabled = false;
    document.getElementById("status").innerText = "Siap spin ✅";
  }, 800);
}
</script>

<script>
async function spin() {
  if (!paid) return;

  document.getElementById("status").innerText = "Memproses spin...";

  try {
    // 🔐 SEMUA HASIL DARI SERVER (ANTI CHEAT TOTAL)
    let res = await fetch("https://YOUR-BACKEND/spin", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ userId: "user123" })
    });

    let data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    document.getElementById("result").innerText =
      "🎁 Kamu dapat: " + data.prize;

    document.getElementById("status").innerText = "Harus bayar lagi";
    paid = false;
    document.getElementById("spinBtn").disabled = true;

  } catch (e) {
    alert("Server error");
  }
}
</script>

</body>
</html>
