<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = ["WAHYU","RP.20.000","RP.5.000","RP.30.000","RP.50.000","Zonk"];
const colors = ["red","blue","green","orange","purple","pink"];

let startAngle = 0;
let spinning = false;
let paid = false;
let spinCount = 0;

const arc = Math.PI * 2 / prizes.length;

function drawWheel() {
  for (let i = 0; i < prizes.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,startAngle+i*arc,startAngle+(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(startAngle+i*arc+arc/2);
    ctx.fillStyle="#fff";
    ctx.fillText(prizes[i],40,0);
    ctx.restore();
  }
}

drawWheel();

function pay() {
  document.getElementById("status").innerText = "Memproses...";
  
  setTimeout(() => {
    paid = true;
    document.getElementById("spinBtn").disabled = false;
    document.getElementById("status").innerText = "Siap spin ✅";
  }, 800);
}

function spin() {
  if (!paid || spinning) return;

  spinning = true;
  document.getElementById("spinBtn").disabled = true;

  spinCount++;

  let targetIndex = (spinCount % 6 === 0)
    ? prizes.indexOf("RP.5.000")
    : prizes.indexOf("Zonk");

  let pointerAngle = (3 * Math.PI / 2);
  let targetAngle = pointerAngle - (targetIndex * arc) - (arc / 2);

  let duration = 5000;
  let start = null;

  let initialAngle = startAngle;
  let totalRotation = (12 * Math.PI) + (targetAngle - initialAngle);

  function animate(timestamp) {
    if (!start) start = timestamp;
    let progress = timestamp - start;

    let t = progress / duration;
    if (t > 1) t = 1;

    let ease = 1 - Math.pow(1 - t, 3);

    startAngle = initialAngle + (totalRotation * ease);

    ctx.clearRect(0,0,300,300);
    drawWheel();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {

      // 🔥 FIX PENTING
      startAngle = startAngle % (Math.PI * 2);

      spinning = false;
      paid = false;

      document.getElementById("spinBtn").disabled = true;

      document.getElementById("result").innerText =
        "🎁 Kamu dapat: " + prizes[targetIndex];

      document.getElementById("status").innerText = "Harus bayar lagi";
    }
  }

  requestAnimationFrame(animate);
}
</script>
