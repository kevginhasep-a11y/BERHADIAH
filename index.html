<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spin Wheel Akurat</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #222;
  color: white;
}

.container {
  position: relative;
  width: 320px;
  margin: 40px auto;
}

.arrow {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

canvas {
  background: #fff;
  border-radius: 50%;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#welcome {
  font-size: 18px;
  color: #00ffcc;
  margin-top: 15px;
  text-shadow: 0 0 8px #00ffcc;
}

#status {
  margin-top: 10px;
  color: yellow;
}

#result {
  margin-top: 20px;
  font-size: 20px;
}

/* 🔥 WhatsApp Floating */
.wa-float {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: #25D366;
  color: white;
  font-size: 24px;
  padding: 15px 18px;
  border-radius: 50%;
  text-decoration: none;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  z-index: 999;
}

.wa-float:hover {
  background: #1ebe5d;
}
</style>
</head>

<body>

<h2>🎡 Spin & Win</h2>

<div class="container">
  <div class="arrow">⬇️</div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<p id="welcome">🎉 Selamat datang di Spin Berhadiah! 🎉</p>

<button onclick="pay()">💰 Scan & Bayar</button>
<button onclick="spin()" id="spinBtn" disabled>🎯 Spin</button>

<div id="status">Status: Belum bayar</div>
<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = [
  "RP.1.000.000",
  "RP.20.000",
  "RP.5.000",
  "RP.30.000",
  "RP.50.000",
  "RP.10.000",
  "Zonk"
];

const colors = ["red","blue","green","orange","purple","cyan","pink"];

let startAngle = 0;
let spinning = false;
let paid = false;

const arc = Math.PI * 2 / prizes.length;

function drawWheel() {
  for (let i = 0; i < prizes.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,startAngle+i*arc,startAngle+(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(startAngle+i*arc+arc/2);
    ctx.fillStyle="#fff";
    ctx.font = "12px Arial";
    ctx.fillText(prizes[i],40,0);
    ctx.restore();
  }
}

drawWheel();

function pay() {
  document.getElementById("status").innerText = "Memproses...";

  setTimeout(() => {
    paid = true;
    document.getElementById("spinBtn").disabled = false;
    document.getElementById("status").innerText = "Siap spin ✅";
  }, 800);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLNaYLfUDmi4Pt4w8RWGrfQwb_Biebdfw",
  authDomain: "berhadiahrupiah.firebaseapp.com",
  databaseURL: "https://berhadiahrupiah-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "berhadiahrupiah",
  storageBucket: "berhadiahrupiah.firebasestorage.app",
  messagingSenderId: "639939931737",
  appId: "1:639939931737:web:9ba3727ca210a582330b48"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function getSpinCount() {
  const snap = await get(ref(db, "spinCount"));
  return snap.exists() ? snap.val() : 0;
}

async function setSpinCount(val) {
  await set(ref(db, "spinCount"), val);
}

window.spin = async function () {
  if (!paid || spinning) return;

  spinning = true;
  document.getElementById("spinBtn").disabled = true;

  let spinCount = await getSpinCount();
  spinCount++;
  await setSpinCount(spinCount);

  let cycle = (spinCount - 1) % 12;

  let targetIndex;

  if (cycle < 5) {
    targetIndex = prizes.indexOf("Zonk");
  } else if (cycle === 5) {
    targetIndex = prizes.indexOf("RP.5.000");
  } else if (cycle < 11) {
    targetIndex = prizes.indexOf("Zonk");
  } else {
    targetIndex = prizes.indexOf("RP.10.000");
  }

  let pointerAngle = (3 * Math.PI / 2);
  let targetAngle = pointerAngle - (targetIndex * arc) - (arc / 2);

  let duration = 5000;
  let start = null;

  let initialAngle = startAngle;
  let totalRotation = (12 * Math.PI) + (targetAngle - initialAngle);

  function animate(timestamp) {
    if (!start) start = timestamp;

    let progress = timestamp - start;
    let t = Math.min(progress / duration, 1);
    let ease = 1 - Math.pow(1 - t, 3);

    startAngle = initialAngle + totalRotation * ease;

    ctx.clearRect(0,0,300,300);
    drawWheel();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      startAngle = startAngle % (Math.PI * 2);

      spinning = false;
      paid = false;

      document.getElementById("spinBtn").disabled = true;

      document.getElementById("result").innerText =
        "🎁 Kamu dapat: " + prizes[targetIndex];

      document.getElementById("status").innerText = "Harus bayar lagi";
    }
  }

  requestAnimationFrame(animate);
};
</script>
