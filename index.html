<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = [
  "WAHYU",
  "RP.20.000",
  "RP.5.000",
  "RP.30.000",
  "RP.50.000",
  "Zonk"
];

const colors = ["red","blue","green","orange","purple","pink"];

const cx = 150;
const cy = 150;
const radius = 150;

let startAngle = 0;
let spinning = false;
let paid = false;

const arc = Math.PI * 2 / prizes.length;

function drawWheel() {
  for (let i = 0; i < prizes.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle + i * arc, startAngle + (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + i * arc + arc / 2);
    ctx.fillStyle = "#fff";
    ctx.font = "12px Arial";
    ctx.fillText(prizes[i], 40, 0);
    ctx.restore();
  }
}

drawWheel();

function pay() {
  if (paid) return;

  document.getElementById("status").innerText = "Status: Memproses pembayaran...";

  setTimeout(() => {
    paid = true;
    document.getElementById("spinBtn").disabled = false;
    document.getElementById("status").innerText = "Status: Pembayaran berhasil ✅";
  }, 800);
}

// 🔥 SISTEM PELUANG (ZONK BESAR)
function getWeightedPrizeIndex() {
  let random = Math.random();

  if (random < 0.75) {
    return prizes.indexOf("Zonk"); // 75% ZONK
  } else {
    // sisanya hadiah random
    let hadiahIndex = Math.floor(Math.random() * (prizes.length - 1));
    return hadiahIndex;
  }
}

function spin() {
  if (!paid || spinning) return;

  spinning = true;
  paid = false;
  document.getElementById("spinBtn").disabled = true;

  // 🔥 ambil hasil yang SUDAH DIATUR
  let targetIndex = getWeightedPrizeIndex();

  // hitung sudut tujuan biar berhenti tepat di hadiah itu
  let targetAngle = (Math.PI * 2) - (targetIndex * arc) - arc / 2;

  let spinAngle = Math.random() * 2000 + 3000;
  let duration = 4000;
  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;
    let progress = timestamp - start;

    let ease = 1 - progress / duration;
    let rotation = spinAngle * ease;

    startAngle += (rotation * Math.PI / 180) * 0.05;

    ctx.clearRect(0, 0, 300, 300);
    drawWheel();

    if (progress < duration) {
      requestAnimationFrame(animate);
    } else {
      // 🔥 paksa berhenti ke target
      startAngle = targetAngle;

      ctx.clearRect(0, 0, 300, 300);
      drawWheel();

      spinning = false;

      document.getElementById("result").innerText =
        "🎁 Kamu dapat: " + prizes[targetIndex];

      document.getElementById("status").innerText = "Status: Selesai";
    }
  }

  requestAnimationFrame(animate);
}
</script>
