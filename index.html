<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spin Wheel Akurat</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #222;
  color: white;
}

.container {
  position: relative;
  width: 320px;
  margin: 40px auto;
}

.arrow {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

canvas {
  background: #fff;
  border-radius: 50%;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#welcome {
  font-size: 18px;
  color: #00ffcc;
  margin-top: 15px;
  text-shadow: 0 0 8px #00ffcc;
}

#status {
  margin-top: 10px;
  color: yellow;
}

#result {
  margin-top: 20px;
  font-size: 20px;
}

/* WhatsApp */
.wa-float {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: #25D366;
  color: white;
  font-size: 24px;
  padding: 15px 18px;
  border-radius: 50%;
  text-decoration: none;
  z-index: 999;
}
</style>
</head>

<body>

<h2>🎡 Spin & Win</h2>

<div class="container">
  <div class="arrow">⬇️</div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<p id="welcome">🎉 Selamat datang di Spin Berhadiah! 🎉</p>

<button onclick="pay()">💰 Scan & Bayar</button>
<button onclick="spin()" id="spinBtn" disabled>🎯 Spin</button>

<div id="status">Status: Belum bayar</div>
<div id="result"></div>

<!-- WhatsApp -->
<a href="https://wa.me/6287774340447" class="wa-float" target="_blank">💬</a>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = [
  "RP.1.000.000",
  "RP.20.000",
  "RP.5.000",
  "RP.30.000",
  "RP.50.000",
  "RP.10.000",
  "Zonk"
];

const colors = ["red","blue","green","orange","purple","cyan","pink"];

let startAngle = 0;
let spinning = false;
let paid = false;

const arc = Math.PI * 2 / prizes.length;

function drawWheel() {
  for (let i = 0; i < prizes.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,startAngle+i*arc,startAngle+(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(startAngle+i*arc+arc/2);
    ctx.fillStyle="#fff";
    ctx.font = "12px Arial";
    ctx.fillText(prizes[i],40,0);
    ctx.restore();
  }
}

drawWheel();

function pay() {
  document.getElementById("status").innerText = "Memproses...";

  // coba kirim ke backend (kalau ada)
  fetch("https://YOUR-BACKEND/pay", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId: "user123" })
  }).catch(() => {});

  setTimeout(() => {
    paid = true;
    document.getElementById("spinBtn").disabled = false;
    document.getElementById("status").innerText = "Siap spin ✅";
  }, 800);
}
</script>

<script>
async function spin() {
  if (!paid || spinning) return;

  spinning = true;
  document.getElementById("spinBtn").disabled = true;

  document.getElementById("status").innerText = "Memproses spin...";

  try {
    // 🔐 coba backend dulu
    let res = await fetch("https://YOUR-BACKEND/spin", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ userId: "user123" })
    });

    if (!res.ok) throw new Error("no backend");

    let data = await res.json();

    document.getElementById("result").innerText =
      "🎁 Kamu dapat: " + data.prize;

  } catch (e) {
    // 🔥 FALLBACK MODE (biar tidak error)
    const fallback = [
      "RP.10.000",
      "RP.20.000",
      "RP.5.000",
      "Zonk"
    ];

    let random = fallback[Math.floor(Math.random() * fallback.length)];

    document.getElementById("result").innerText =
      "🎁 (Demo Mode) Kamu dapat: " + random;
  }

  paid = false;
  spinning = false;
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("status").innerText = "Harus bayar lagi";
}
</script>

</body>
</html>
